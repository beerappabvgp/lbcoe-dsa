
<style>
  * { box-sizing: border-box; }
  .qs-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  .phase-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; min-height: 18px; }
  .explain-box { font-size: 13px; color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; margin: 10px 0 16px; min-height: 44px; line-height: 1.6; }
  .array-row { display: flex; gap: 6px; align-items: flex-end; margin: 10px 0 4px; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cell-box { width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; border: 1.5px solid transparent; transition: background .25s, border-color .25s, color .25s; }
  .cell-idx { font-size: 11px; color: var(--color-text-secondary); }
  .cell-tag { font-size: 10px; min-height: 14px; text-align: center; color: var(--color-text-secondary); font-weight: 500; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0 16px; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
  .leg-dot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 16px; }
  .btn { padding: 7px 18px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; transition: background .15s; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn:disabled { opacity: .38; cursor: default; }
  .btn-primary { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
  .btn-primary:hover { opacity: .85; background: var(--color-background-info); }
  .progress { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 18px 0; }
  .call-stack { margin-top: 12px; }
  .call-stack-title { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .frame { display: inline-block; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--color-text-primary); margin: 2px; }
  .frame.active { border-color: #534AB7; color: #534AB7; }
</style>

<div class="qs-wrap">
  <h2 class="sr-only">Quick Sort interactive dry run — step through partition and recursion</h2>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#EEEDFE;border:1.5px solid #534AB7"></div>Pivot</div>
    <div class="leg"><div class="leg-dot" style="background:#E1F5EE;border:1.5px solid #0F6E56"></div>i pointer (smaller zone)</div>
    <div class="leg"><div class="leg-dot" style="background:#FAEEDA;border:1.5px solid #854F0B"></div>j pointer (scanning)</div>
    <div class="leg"><div class="leg-dot" style="background:#FAECE7;border:1.5px solid #993C1D"></div>Swap happening</div>
    <div class="leg"><div class="leg-dot" style="background:#EAF3DE;border:1.5px solid #3B6D11"></div>Sorted / placed</div>
    <div class="leg"><div class="leg-dot" style="background:var(--color-background-secondary);border:1.5px solid var(--color-border-tertiary)"></div>Idle</div>
  </div>

  <div class="phase-label" id="phase-label">Ready</div>
  <div class="array-row" id="array-display"></div>
  <div class="explain-box" id="explain-box">Press <b>Next step</b> to begin the Quick Sort dry run on <b>[8, 3, 1, 5, 2, 7, 4, 6]</b>.</div>

  <div class="call-stack">
    <div class="call-stack-title">Recursion call stack</div>
    <div id="call-stack-display"></div>
  </div>

  <hr class="divider">
  <div class="controls">
    <button class="btn btn-primary" id="btn-next" onclick="nextStep()">Next step ↗</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" onclick="reset()">Reset</button>
    <span class="progress" id="progress-label"></span>
  </div>
</div>

<script>
const INITIAL = [8, 3, 1, 5, 2, 7, 4, 6];

let steps = [];
let stepIdx = 0;
let autoTimer = null;

function buildSteps() {
  steps = [];
  let arr = [...INITIAL];
  let sorted = new Array(arr.length).fill(false);
  let callStack = [];

  function addStep(arr, state, explain, phase, stack) {
    steps.push({
      arr: [...arr],
      state: [...state],
      explain,
      phase,
      stack: [...stack],
    });
  }

  function partition(arr, lo, hi, stack) {
    let state = new Array(arr.length).fill('idle');
    for (let k = lo; k <= hi; k++) state[k] = 'active';

    let pivot = arr[hi];
    state[hi] = 'pivot';
    addStep(arr, state, `<b>Partition [${lo}..${hi}]</b> — Pick pivot = <b>${pivot}</b> (last element, index ${hi}). We'll use two pointers: <b>i</b> tracks the boundary of values ≤ pivot, <b>j</b> scans forward.`, `Partition [${lo}..${hi}]`, stack);

    let i = lo - 1;

    for (let j = lo; j < hi; j++) {
      let s = new Array(arr.length).fill('idle');
      for (let k = lo; k <= hi; k++) s[k] = 'active';
      s[hi] = 'pivot';
      if (i >= lo) s[i] = 'i';
      s[j] = 'j';
      addStep(arr, s, `<b>j = ${j}</b>: Compare arr[j] = <b>${arr[j]}</b> with pivot <b>${pivot}</b>. Is ${arr[j]} ≤ ${pivot}? <b>${arr[j] <= pivot ? 'Yes' : 'No'}</b>${arr[j] <= pivot ? ' → expand smaller zone: i++, swap arr[i] ↔ arr[j].' : ' → skip, j moves on.'}`, `Scanning: j=${j}`, stack);

      if (arr[j] <= pivot) {
        i++;
        let tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
        let s2 = new Array(arr.length).fill('idle');
        for (let k = lo; k <= hi; k++) s2[k] = 'active';
        s2[hi] = 'pivot';
        s2[i] = 'swap';
        s2[j] = 'swap';
        addStep(arr, s2, `<b>Swap</b> arr[${i}]=${arr[i]} ↔ arr[${j}]=${arr[j]}. i is now <b>${i}</b>. All elements in [${lo}..${i}] are ≤ ${pivot}.`, `Swap at i=${i}, j=${j}`, stack);
      }
    }

    let pivotIdx = i + 1;
    let tmp = arr[pivotIdx]; arr[pivotIdx] = arr[hi]; arr[hi] = tmp;
    let sf = new Array(arr.length).fill('idle');
    for (let k = lo; k <= hi; k++) sf[k] = 'active';
    sf[pivotIdx] = 'sorted';
    addStep(arr, sf, `<b>Place pivot</b>: swap arr[${pivotIdx}] ↔ arr[${hi}]. Pivot <b>${pivot}</b> is now at index ${pivotIdx} — its <b>final sorted position</b>. Everything left of it ≤ ${pivot}; everything right > ${pivot}.`, `Pivot ${pivot} placed at index ${pivotIdx}`, stack);

    return pivotIdx;
  }

  function qs(arr, lo, hi, stack) {
    if (lo >= hi) {
      if (lo === hi) {
        let s = new Array(arr.length).fill('idle');
        s[lo] = 'sorted';
        addStep(arr, s, `Base case: subarray of length 1 at index ${lo} (value ${arr[lo]}) is already sorted.`, `Base case [${lo}]`, stack);
      }
      return;
    }
    let newStack = [...stack, `qs(${lo}, ${hi})`];
    let s0 = new Array(arr.length).fill('idle');
    for (let k = lo; k <= hi; k++) s0[k] = 'active';
    addStep(arr, s0, `<b>quickSort([${lo}..${hi}])</b> called — subarray: [${arr.slice(lo, hi+1).join(', ')}]. Will partition this range.`, `Entering qs(${lo}, ${hi})`, newStack);

    let p = partition(arr, lo, hi, newStack);
    qs(arr, lo, p - 1, newStack);
    qs(arr, p + 1, hi, newStack);
  }

  qs(arr, 0, arr.length - 1, []);

  let sf = new Array(arr.length).fill('sorted');
  steps.push({ arr: [...arr], state: sf, explain: '🎉 <b>Array is fully sorted!</b> Quick Sort is complete. Final array: [' + arr.join(', ') + ']', phase: 'Done!', stack: [] });
}

function cellColor(type) {
  const map = {
    pivot: { bg: '#EEEDFE', border: '#534AB7', text: '#3C3489' },
    i:     { bg: '#E1F5EE', border: '#0F6E56', text: '#085041' },
    j:     { bg: '#FAEEDA', border: '#854F0B', text: '#633806' },
    swap:  { bg: '#FAECE7', border: '#993C1D', text: '#712B13' },
    sorted:{ bg: '#EAF3DE', border: '#3B6D11', text: '#27500A' },
    active:{ bg: 'var(--color-background-secondary)', border: 'var(--color-border-secondary)', text: 'var(--color-text-primary)' },
    idle:  { bg: 'var(--color-background-primary)', border: 'var(--color-border-tertiary)', text: 'var(--color-text-secondary)' },
  };
  return map[type] || map.idle;
}

function tagLabel(type, idx, arr, lo, hi) {
  if (type === 'pivot') return 'pivot';
  if (type === 'i') return 'i';
  if (type === 'j') return 'j';
  if (type === 'swap') return '↔';
  if (type === 'sorted') return '✓';
  return '';
}

function render() {
  const s = steps[stepIdx];
  const disp = document.getElementById('array-display');
  disp.innerHTML = '';
  s.arr.forEach((v, i) => {
    const t = s.state[i];
    const c = cellColor(t);
    const tag = tagLabel(t, i);
    disp.innerHTML += `
      <div class="cell">
        <div class="cell-tag">${tag}</div>
        <div class="cell-box" style="background:${c.bg};border-color:${c.border};color:${c.text}">${v}</div>
        <div class="cell-idx">${i}</div>
      </div>`;
  });

  document.getElementById('phase-label').textContent = s.phase;
  document.getElementById('explain-box').innerHTML = s.explain;

  const cs = document.getElementById('call-stack-display');
  if (s.stack.length === 0) { cs.innerHTML = '<span style="font-size:12px;color:var(--color-text-secondary)">—</span>'; }
  else {
    cs.innerHTML = s.stack.map((f, i) => `<span class="frame ${i === s.stack.length-1 ? 'active' : ''}">${f}</span>`).join('');
  }

  document.getElementById('progress-label').textContent = `Step ${stepIdx + 1} / ${steps.length}`;
  document.getElementById('btn-next').disabled = stepIdx >= steps.length - 1;
}

function nextStep() {
  if (stepIdx < steps.length - 1) { stepIdx++; render(); }
}

let autoOn = false;
function toggleAuto() {
  autoOn = !autoOn;
  document.getElementById('btn-auto').textContent = autoOn ? 'Pause' : 'Auto play';
  if (autoOn) {
    autoTimer = setInterval(() => {
      if (stepIdx >= steps.length - 1) { clearInterval(autoTimer); autoOn = false; document.getElementById('btn-auto').textContent = 'Auto play'; return; }
      nextStep();
    }, 900);
  } else { clearInterval(autoTimer); }
}

function reset() {
  clearInterval(autoTimer); autoOn = false;
  document.getElementById('btn-auto').textContent = 'Auto play';
  stepIdx = 0; render();
}

buildSteps();
render();
</script>
